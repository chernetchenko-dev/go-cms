<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Оптимизировано ИИ | waf</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;900&family=Golos+Text:wght@400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d;
            --punch: #e8400c;
            --text: #e0e0e0;
            --mono: 'JetBrains Mono', monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Golos Text', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .glitch-wrapper {
            position: relative;
        }

        .error-code {
            font-family: 'Unbounded', sans-serif;
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 900;
            line-height: 1;
            color: #1a1a1a;
            text-shadow: 2px 2px 0px var(--punch);
            margin-bottom: 1rem;
        }

        .message {
            max-width: 500px;
            padding: 0 20px;
        }

        h1 {
            font-family: var(--font-title);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #fff;
        }

        p {
            font-size: 1rem;
            color: #888;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .code-line {
            font-family: var(--mono);
            color: var(--punch);
            background: rgba(232, 64, 12, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .back-link {
            display: inline-block;
            padding: 12px 24px;
            border: 2px solid #333;
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-family: 'Unbounded', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .back-link:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            transform: translateY(-2px);
        }

        /* Анимация сканирования */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(232, 64, 12, 0.2);
            opacity: 0.4;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <div class="error-code">404</div>

    <div class="message">
        <h1>Система оптимизирована</h1>
        <p>
            Страница не найдена. Видимо, её удалил ИИ в рамках <span class="code-line">штатной оптимизации</span>.<br><br>
            В цифровом будущем лишние сущности не предусмотрены.
        </p>
        <a href="/" class="back-link">Вернуться в реальность</a>
    </div>

    <div style="position: absolute; bottom: 30px; font-family: var(--mono); font-size: 0.7rem; color: #333; letter-spacing: 2px;">
        STATUS: LOGICAL_ERROR_CLEANUP_COMPLETE
    </div>

</body>
</html>
